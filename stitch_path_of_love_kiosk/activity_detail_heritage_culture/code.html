<style>

        .page-transition {
            animation: fadeInScale 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }

</button>
<!-- Swipeable Gallery -->
<div class="flex w-full h-full overflow-x-auto snap-x snap-mandatory hide-scrollbar">

<div class="min-w-full h-full snap-center relative">

<div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent"></div>
</div>
<!-- Additional gallery items would go here for full swipe functionality -->
</div>

<div class="absolute bottom-margin-edge left-1/2 transform -translate-x-1/2 flex gap-unit z-20">
<div class="w-3 h-3 rounded-full bg-primary glow-ambient"></div>
<div class="w-3 h-3 rounded-full bg-on-surface-variant/50"></div>
<div class="w-3 h-3 rounded-full bg-on-surface-variant/50"></div>
</div>

<span class="material-symbols-outlined text-primary text-[20px] filled-icon">account_balance</span>

</div>
<!-- Main Title -->
<h1 class="font-display-lg text-display-lg text-on-background">
                    Protection of Heritage &amp; Culture
                </h1>

<div class="w-24 h-1 bg-gradient-to-r from-primary to-secondary rounded-full"></div>

<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                    Focuses on the massive renovation and Kumbhabhishekam of ancient temples across India, restoration of Vahanams, and preserving traditional arts via the Deiva Tamizh Isai Vizha.
                </p>

<div class="pt-8">
<button class="h-touch-target-min px-8 rounded-full bg-gradient-to-r from-primary to-secondary text-on-primary font-button-text text-button-text flex items-center gap-3 hover:scale-105 active:scale-95 transition-transform duration-400 glow-ambient">
