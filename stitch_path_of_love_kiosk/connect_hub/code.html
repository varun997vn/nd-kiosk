<button class="flex flex-col items-center justify-center text-on-surface-variant h-16 w-32 active:bg-surface-bright transition-colors rounded-xl" id="btn-back">

<button class="flex flex-col items-center justify-center text-on-surface-variant h-16 w-32 active:bg-surface-bright transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="contrast" style="font-size: 28px;">contrast</span>
<span class="font-label-lg text-label-lg">Contrast</span>
</button>

<script>
        // Slide Right Transition for Back Button
        document.getElementById('btn-back').addEventListener('click', function() {
            const container = document.getElementById('main-container');
            container.classList.add('slide-right-exit');
            
            // In a real app, you'd navigate after the animation completes
            setTimeout(() => {
                // window.history.back();
                // Reset for demo purposes
                container.classList.remove('slide-right-exit');
                container.style.opacity = '0';
                setTimeout(() => { container.style.opacity = '1'; }, 50);
            }, 400);
        });
    </script>
