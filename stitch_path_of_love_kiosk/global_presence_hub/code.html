<style>
        /* Smooth sweeping transitions for the kiosk */
        .page-transition {
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .slide-right-transition {
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
        }
        .slide-right-transition:active {
            transform: translateX(10px);
            opacity: 0.8;
        }

        /* Ambient Saffron Glow */
        .glow-saffron {
            box-shadow: 0 0 40px -10px rgba(226, 125, 24, 0.4);
        }
        .glow-saffron-hover:hover {
            box-shadow: 0 0 60px -10px rgba(226, 125, 24, 0.6);
            border-color: rgba(226, 125, 24, 0.8);
        }

        /* Hide scrollbars but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Edge fade for scrollable areas */
        .fade-bottom::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top, #151311 0%, transparent 100%);
            pointer-events: none;
            z-index: 10;
        }
    </style>
