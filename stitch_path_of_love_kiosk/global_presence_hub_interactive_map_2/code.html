<style>
        /* Base Kiosk Setup */

<script>
        const listPanel = document.getElementById('directory-list-panel');
        const detailPanel = document.getElementById('detail-panel');
        const mapWrapper = document.getElementById('map-wrapper');
        
        const titleEl = document.getElementById('detail-title');
        const subtitleEl = document.getElementById('detail-subtitle');
        const descEl = document.getElementById('detail-description');

        const locationPans = {
            'Bengaluru': { x: '-15%', y: '-5%' },
            'Chennai': { x: '-20%', y: '-10%' },
            'Madurai': { x: '-20%', y: '-15%' },
            'USA': { x: '25%', y: '5%' },
            'Australia': { x: '-35%', y: '-25%' },
            'Singapore': { x: '-28%', y: '-10%' }
        };

        function showDetail(title, region, description) {
            // Update content
            titleEl.textContent = title;
            subtitleEl.textContent = region;
            descEl.textContent = description;

            // Transition panels
            listPanel.style.transform = 'translateX(-100%)';
            listPanel.style.opacity = '0';
            listPanel.style.pointerEvents = 'none';
            
            detailPanel.style.transform = 'translateX(0)';
            detailPanel.style.opacity = '1';
            detailPanel.style.pointerEvents = 'auto';

            // Transition map
            const pan = locationPans[title] || { x: '0%', y: '0%' };
            mapWrapper.style.transform = `scale(1.5) translate(${pan.x}, ${pan.y})`;
        }

        function hideDetail() {
            // Transition panels
            detailPanel.style.transform = 'translateX(100%)';
            detailPanel.style.opacity = '0';
            detailPanel.style.pointerEvents = 'none';
            
            listPanel.style.transform = 'translateX(0)';
            listPanel.style.opacity = '1';
            listPanel.style.pointerEvents = 'auto';

            // Reset map
            mapWrapper.style.transform = 'scale(1) translate(0, 0)';
        }
    </script>
