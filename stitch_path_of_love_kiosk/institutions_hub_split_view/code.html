<style>
        /* Smooth scrolling and transitions */
        html { scroll-behavior: smooth; }
        body { 
            background-color: theme('colors.background'); 
            color: theme('colors.on-background');
            transition: background-color 0.4s ease-in-out, color 0.4s ease-in-out;
            overflow-x: hidden;
        }
        
        /* Slide Transitions */
        .slide-right-out {
            animation: slideRightOut 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .slide-left-out {
            animation: slideLeftOut 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideRightOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }
        @keyframes slideLeftOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-100%); opacity: 0; }
        }
        
        /* Fade in for page load */
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(44, 41, 39, 0.6); /* surface-container-high with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(163, 140, 124, 0.2); /* outline with opacity */
        }
        
        /* Ambient Glow Focus */
        .glow-focus:focus-visible {
            outline: none;
            box-shadow: 0 0 24px rgba(233, 195, 73, 0.4); /* secondary color glow */
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: theme('colors.surface-variant');
            border-radius: 20px;
        }
        
        /* Map Pin Animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 183, 127, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 183, 127, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 183, 127, 0); }
        }
        .map-pin {
            animation: pulse 2s infinite;
        }
    </style>
